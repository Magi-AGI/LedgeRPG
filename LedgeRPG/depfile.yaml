# Magi Unity Dependency File
# Generated for LedgeRPG (Track B — Unity client)
# Managed by MagiUnityDependencyManager
# Initial depfile: 2026-04-17 - Unity 6000.4.2f1, modelled on LedgeTCG/depfile.yaml

version: 1.0

project:
  name: LedgeRPG
  unityVersion: 6000.4.2f1
  targetPlatforms:
    - StandaloneWindows64
    - WebGL

registries:
  - name: Unity
    url: https://packages.unity.com
    scopes:
      - com.unity
  - name: OpenUPM
    url: https://package.openupm.com
    scopes:
      - com.coplaydev

packages:
  # Local Magi packages
  # com.magi.unitytools is the always-on shared layer (logging, wiki sync, dep manager host).
  - name: com.magi.unitytools
    path: ../../MagiUnityTools/MagiUnityTools/Assets/_Project/Scripts
    source: local

  # com.magi.ledgeboardgame and com.magi.ledgetcg are DEFERRED until:
  #   - LedgeBoardGame.Core (M1) is extracted and packaged for Unity consumption, and
  #   - the RPG adapter against MagiGameServer.Contracts is ready to bind.
  # The paper-mirror first draft (hex grid, headless-parity mechanics) does not need them.

  # JSON serialization - wire payloads to MagiGameServer + wiki sync
  - name: com.unity.nuget.newtonsoft-json
    version: 3.2.2
    source: registry

  # Multiplayer - NGO v2 from day one so code is network-aware even before the adapter lands
  - name: com.unity.netcode.gameobjects
    version: 2.9.1
    source: registry

  # Core engine
  - name: com.unity.inputsystem
    version: 1.19.0
    source: registry

  - name: com.unity.mathematics
    version: 1.3.3
    source: registry

  - name: com.unity.burst
    version: 1.8.29
    source: registry

  # UI - ships TextMeshPro in Unity 6
  - name: com.unity.ugui
    version: 2.0.0
    source: registry

  # Rendering - URP for the 3D hex grid scene
  - name: com.unity.render-pipelines.universal
    version: 17.4.0
    source: registry

  # 2D - tile/sprite fallbacks for the first-draft hex grid
  - name: com.unity.2d.sprite
    version: 1.0.0
    source: registry

  # Testing
  - name: com.unity.test-framework
    version: 1.6.0
    source: registry

  - name: com.unity.ext.nunit
    version: 2.0.5
    source: registry

  # IDE integrations
  - name: com.unity.ide.rider
    version: 3.0.39
    source: registry

  - name: com.unity.ide.visualstudio
    version: 2.0.27
    source: registry

  # Unity official MCP + chat - version pinned to what sibling repos are running
  - name: com.unity.ai.assistant
    version: 2.6.0-pre.1
    source: registry
    policyException: development-tool

  # Coplay MCP bridge (OpenUPM)
  - name: com.coplaydev.unity-mcp
    version: 9.6.6
    source: registry
    policyException: development-tool

  # Engine modules - Unity no longer auto-includes these with a minimal depfile.
  # Shared with LedgeBoardGame / LedgeTCG / cardcore:
  - name: com.unity.modules.imageconversion
    version: 1.0.0
    source: registry
  - name: com.unity.modules.screencapture
    version: 1.0.0
    source: registry
  - name: com.unity.modules.jsonserialize
    version: 1.0.0
    source: registry
  - name: com.unity.modules.unitywebrequest
    version: 1.0.0
    source: registry
  - name: com.unity.modules.unitywebrequesttexture
    version: 1.0.0
    source: registry
  - name: com.unity.modules.uielements
    version: 1.0.0
    source: registry
  - name: com.unity.modules.imgui
    version: 1.0.0
    source: registry
  - name: com.unity.modules.ui
    version: 1.0.0
    source: registry
  - name: com.unity.modules.animation
    version: 1.0.0
    source: registry

  # LedgeRPG additions - physics for hex-grid agent movement + audio/FX for encounters
  - name: com.unity.modules.physics
    version: 1.0.0
    source: registry
  - name: com.unity.modules.audio
    version: 1.0.0
    source: registry
  - name: com.unity.modules.particlesystem
    version: 1.0.0
    source: registry

# Policy configuration
policy:
  allowGitDependencies: false
  allowPrerelease: true  # ai.assistant ships as pre-release
  requireLockFile: true
  bannedAPIs:
    - GameObject.Find
    - SendMessage
  requiredPackages:
    - com.magi.unitytools
    - com.unity.nuget.newtonsoft-json
    - com.unity.netcode.gameobjects
  maxPackageCount: 60

# Notes:
# - Target Unity 6000.4.2f1 (matches LedgeBoardGame/LedgeTCG/cardcore)
# - First-draft mirror: the Python paper server's hex-grid mechanics, rendered in Unity.
#   Richer RPG content (inventory, quest, LedgeTCG-as-encounter) layers in later.
# - NGO v2.9.1 included from day one (network-aware types from the start).
# - Dropped vs. LedgeTCG:
#     physics2d                - no 2D physics in the hex-grid first draft
#     com.magi.ledgeboardgame  - deferred until adapter milestone
# - Added vs. LedgeTCG:
#     (nothing yet) - RPG-specific packages will be scoped when encounter system lands
